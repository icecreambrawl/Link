<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ice Cream Brawl 2 — Brawl Stars с оффлайн боями!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1e88e5 0%, #1565c0 100%);
            font-family: 'Segoe UI', 'Poppins', 'Brawl Stars', system-ui, -apple-system, 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
        }

        /* основной карточный контейнер */
        .glass-panel {
            max-width: 1300px;
            width: 100%;
            background: #2196F3;
            border-radius: 4rem 3rem 4rem 3rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 8px rgba(255, 255, 255, 0.2);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* зона заголовка */
        .hero-banner {
            background: #1976D2;
            background-image: radial-gradient(circle at 10% 30%, rgba(255, 255, 255, 0.1) 2%, transparent 2.5%),
                              radial-gradient(circle at 85% 70%, rgba(255, 255, 255, 0.1) 1.8%, transparent 2%);
            background-size: 40px 40px, 35px 35px;
            padding: 2.5rem 2rem 1.8rem 2rem;
            text-align: center;
            border-bottom: 4px solid #1565C0;
        }

        /* БЕЛЫЙ ЗАГОЛОВОК */
        .hero-banner h1 {
            font-size: clamp(1.9rem, 7vw, 3.4rem);
            font-weight: 800;
            letter-spacing: -0.01em;
            color: #FFFFFF; /* Чисто белый цвет */
            text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.3); /* Тень для объема */
            margin-bottom: 0.5rem;
            word-break: break-word;
            text-transform: uppercase;
        }

        .hero-banner .sub {
            font-size: 1.15rem;
            font-weight: 600;
            color: #E3F2FD;
            background: rgba(255, 255, 255, 0.15);
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            backdrop-filter: blur(2px);
        }

        .content-core {
            padding: 2.2rem 2rem 2.5rem 2rem;
            display: flex;            flex-wrap: wrap;
            gap: 2.5rem;
            justify-content: center;
            align-items: center;
        }

        .logo-area {
            flex: 1.2;
            min-width: 200px;
            display: flex;
            justify-content: center;
        }

        .logo-frame {
            background: #E3F2FD;
            border-radius: 3rem;
            padding: 1rem;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.15);
            max-width: 320px;
            width: 100%;
        }

        .logo-frame img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 2rem;
            object-fit: contain;
            background: #bbdefb;
        }

        .buttons-area {
            flex: 2;
            min-width: 260px;
            display: flex;
            flex-direction: column;
            gap: 1.7rem;
        }

        /* БЕЛЫЕ КНОПКИ */
        .btn-white {
            background: #FFFFFF; /* Белый фон */
            border: none;
            border-radius: 60px;
            padding: 1rem 1.5rem;
            font-size: 1.5rem;
            font-weight: 800;
            font-family: inherit;
            letter-spacing: 1px;
            color: #1976D2; /* Синий текст */
            box-shadow: 0 8px 0 #BBDEFB; /* Голубая тень снизу */
            cursor: pointer;
            transition: all 0.1s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            width: 100%;
        }

        .btn-white:active {
            transform: translateY(3px);
            box-shadow: 0 4px 0 #BBDEFB;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            object-fit: contain;
        }

        .btn-white span {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        /* блок ошибок */
        .error-message-box {
            background-color: #D32F2F;
            border-left: 10px solid #FFCDD2;
            border-radius: 20px;
            padding: 0.9rem 1.2rem;
            margin-top: 0.8rem;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .error-area {            margin-top: 0.5rem;
        }

        @media (max-width: 780px) {
            .content-core {
                flex-direction: column;
                padding: 1.5rem;
            }
            .btn-white {
                font-size: 1.2rem;
            }
            .hero-banner h1 {
                font-size: 1.8rem;
            }
        }

        .footer-note {
            background: #1565C0;
            text-align: center;
            padding: 1rem;
            font-size: 0.9rem;
            font-weight: 700;
            color: #E3F2FD;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        button:focus-visible {
            outline: 3px solid #FFFFFF;
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <div class="hero-banner">
        <h1>ICE CREAM BRAWL 2 - ПРИВАТНЫЙ СЕРВЕР BRAWL STARS!</h1>
        <div class="sub">🍦 Официальный сайт 🍦</div>
    </div>

    <div class="content-core">
        <div class="logo-area">
            <div class="logo-frame">
                <img src="img/server_logo.png" alt="Логотип" onerror="this.src='https://placehold.co/400x400/1976D2/ffffff?text=ICE+CREAM';">
            </div>
        </div>

        <div class="buttons-area">
            <button id="downloadBtn" class="btn-white">
                <span>📁 СКАЧАТЬ</span>
            </button>

            <button id="telegramBtn" class="btn-white">
                <span>
                    <img class="btn-icon" src="img/telegram_icon.png" alt="TG" onerror="this.src='https://placehold.co/48x48/0088cc/white?text=TG';">
                    КАНАЛ В ТЕЛЕГРАММ
                </span>
            </button>

            <button id="gemsErrorBtn" class="btn-white">
                <span>💎 ГЕМЫ 💎</span>
            </button>

            <div id="errorContainer" class="error-area"></div>
        </div>
    </div>
    <div class="footer-note">
        🍦 Ice Cream Brawl 2 - Brawl Stars с оффлайн боями! 🍦
    </div>
</div>

<script>
    const downloadBtn = document.getElementById('downloadBtn');
    const telegramBtn = document.getElementById('telegramBtn');
    const gemsErrorBtn = document.getElementById('gemsErrorBtn');
    const errorContainer = document.getElementById('errorContainer');

    function showError(message) {
        errorContainer.innerHTML = '';
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-message-box';
        errorDiv.textContent = message;
        errorContainer.appendChild(errorDiv);
        errorDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    downloadBtn.addEventListener('click', () => showError('ERROR: Сервер ещё не вышел'));
    
    telegramBtn.addEventListener('click', () => {
        window.open('https://t.me/IceCreamBrawl2', '_blank');
        errorContainer.innerHTML = '';
    });

    gemsErrorBtn.addEventListener('click', () => showError('ERROR: Сейчас гемы получить нельзя'));
</script>
</body>
</html>
