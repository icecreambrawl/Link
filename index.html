<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ice Cream Brawl 2 — приватный сервер Brawl Stars</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #FFD966 0%, #FFB347 100%);
            font-family: 'Segoe UI', 'Poppins', 'Brawl Stars', system-ui, -apple-system, 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
        }

        /* основной карточный контейнер с желтым фоном */
        .glass-panel {
            max-width: 1300px;
            width: 100%;
            background: #FFE484;
            border-radius: 4rem 3rem 4rem 3rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), 0 0 0 8px rgba(255, 215, 0, 0.5);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* зона заголовка с фоном-изображением или цветом */
        .hero-banner {
            background: #F7D44A;
            background-image: radial-gradient(circle at 10% 30%, rgba(255, 245, 190, 0.6) 2%, transparent 2.5%),
                              radial-gradient(circle at 85% 70%, rgba(255, 220, 100, 0.5) 1.8%, transparent 2%);
            background-size: 40px 40px, 35px 35px;
            padding: 2.5rem 2rem 1.8rem 2rem;
            text-align: center;
            border-bottom: 4px solid #FFC107;
        }

        .hero-banner h1 {
            font-size: clamp(1.9rem, 7vw, 3.4rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #B45F1B, #7A3E0E);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 4px 4px 12px rgba(255, 215, 0, 0.7);
            margin-bottom: 0.5rem;
            word-break: break-word;
        }

        .hero-banner .sub {
            font-size: 1.15rem;
            font-weight: 600;
            color: #A35C1A;
            background: rgba(255, 245, 200, 0.7);
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            backdrop-filter: blur(2px);
        }

        /* контент: логотип + кнопки + иконки */
        .content-core {
            padding: 2.2rem 2rem 2.5rem 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 2.5rem;
            justify-content: center;
            align-items: center;
        }

        /* левая колонка: логотип сервера */
        .logo-area {
            flex: 1.2;
            min-width: 200px;
            display: flex;
            justify-content: center;
        }

        .logo-frame {
            background: #FFF2CC;
            border-radius: 3rem;
            padding: 1rem;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease;
            max-width: 320px;
            width: 100%;
        }

        .logo-frame img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 2rem;
            object-fit: contain;
            background: #ffefb9;
        }

        /* правая колонка: кнопки + гемы */
        .buttons-area {
            flex: 2;
            min-width: 260px;
            display: flex;
            flex-direction: column;
            gap: 1.7rem;
        }

        /* стили белых кнопок */
        .btn-white {
            background: white;
            border: none;
            border-radius: 60px;
            padding: 1rem 1.5rem;
            font-size: 1.5rem;
            font-weight: 800;
            font-family: inherit;
            letter-spacing: 1px;
            color: #D98E2B;
            box-shadow: 0 8px 0 #C9A03D;
            cursor: pointer;
            transition: all 0.1s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            width: 100%;
            text-align: center;
        }

        .btn-white:active {
            transform: translateY(3px);
            box-shadow: 0 4px 0 #C9A03D;
        }

        /* иконки внутри кнопок */
        .btn-icon {
            width: 36px;
            height: 36px;
            object-fit: contain;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
        }

        .btn-white span {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        /* блок для отображения ошибок (красный прямоугольник) */
        .error-message-box {
            background-color: #B91C1C;
            border-left: 10px solid #FFE6A3;
            border-radius: 20px;
            padding: 0.9rem 1.2rem;
            margin-top: 0.8rem;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
            transition: 0.2s;
            backdrop-filter: blur(1px);
            font-family: monospace;
            letter-spacing: 0.5px;
            word-break: break-word;
        }

        /* контейнер для ошибок */
        .error-area {
            margin-top: 0.5rem;
        }

        /* секция с гемами картинка */
        .gems-preview {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #FFF2CC;
            border-radius: 2.5rem;
            padding: 1rem 1rem 0.8rem;
            margin-top: 0.2rem;
        }

        .gems-img {
            max-width: 120px;
            width: 100%;
            margin-bottom: 0.3rem;
        }

        .gems-img img {
            width: 100%;
            border-radius: 2rem;
            background: #FFE7A3;
            padding: 6px;
        }

        .gems-caption {
            font-weight: 700;
            color: #B45116;
            background: rgba(255, 235, 150, 0.9);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
        }

        /* МОДАЛЬНОЕ ОКНО ДЛЯ ПРАЙСА ГЕМОВ */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-container {
            background: #FFF6E0;
            border-radius: 3rem;
            max-width: 90vw;
            max-height: 90vh;
            width: auto;
            padding: 1.8rem 1.5rem 2rem 1.5rem;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.4), 0 0 0 6px #FFCF7A;
            text-align: center;
            position: relative;
            animation: modalPop 0.25s cubic-bezier(0.34, 1.2, 0.64, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        @keyframes modalPop {
            from {
                transform: scale(0.92);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-title {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #C26F1E, #9B4E0E);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.3px;
        }

        .modal-title span {
            font-size: 2rem;
        }

        .modal-image {
            background: #FFE3A3;
            border-radius: 2rem;
            padding: 1rem;
            max-width: 100%;
            box-shadow: inset 0 0 0 2px white, 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .modal-image img {
            max-width: 100%;
            max-height: 55vh;
            border-radius: 1.5rem;
            display: block;
            object-fit: contain;
            background: #FBD982;
        }

        .modal-close {
            background: #F5B642;
            border: none;
            padding: 0.7rem 2rem;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #442100;
            cursor: pointer;
            transition: 0.1s linear;
            margin-top: 0.5rem;
            box-shadow: 0 4px 0 #B4631A;
            font-family: inherit;
        }

        .modal-close:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #B4631A;
        }

        /* адаптивность */
        @media (max-width: 780px) {
            .content-core {
                flex-direction: column;
                padding: 1.5rem;
            }
            .btn-white {
                font-size: 1.2rem;
                padding: 0.8rem 1rem;
            }
            .btn-icon {
                width: 28px;
                height: 28px;
            }
            .hero-banner {
                padding: 1.8rem 1rem;
            }
            .modal-title {
                font-size: 1.4rem;
            }
        }

        /* футер */
        .footer-note {
            background: #FADB67;
            text-align: center;
            padding: 1rem;
            font-size: 0.8rem;
            color: #7A4512;
            font-weight: 500;
            border-top: 1px solid #FFE087;
        }

        button {
            background: white;
        }

        button:focus-visible {
            outline: 3px solid #AA5E1C;
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <!-- ЗАГОЛОВОК НА ФОНЕ ПРИ ВХОДЕ -->
    <div class="hero-banner">
        <h1>ICE CREAM BRAWL 2 - ПРИВАТНЫЙ СЕРВЕР BRAWL STARS!</h1>
        <div class="sub">🍦 Официальный сайт 🍦</div>
    </div>

    <div class="content-core">
        <!-- Левая часть: server_logo.png -->
        <div class="logo-area">
            <div class="logo-frame">
                <img src="img/server_logo.png" alt="Логотип Ice Cream Brawl" onerror="this.src='https://placehold.co/400x400/FFD966/623d1a?text=LOGO+ICE+CREAM'; this.onerror=null;">
            </div>
        </div>

        <!-- Правая часть с кнопками -->
        <div class="buttons-area">
            <!-- КНОПКА СКАЧАТЬ -->
            <button id="downloadBtn" class="btn-white">
                <span>📁 СКАЧАТЬ</span>
            </button>

            <!-- КНОПКА КАНАЛ В ТЕЛЕГРАММ с иконкой и ссылкой https://t.me/IceCreamBrawl2 -->
            <button id="telegramBtn" class="btn-white">
                <span>
                    <img class="btn-icon" src="img/telegram_icon.png" alt="Telegram" onerror="this.src='https://placehold.co/48x48/0088cc/white?text=TG'; this.onerror=null;">
                    КАНАЛ В ТЕЛЕГРАММ
                </span>
            </button>

            <!-- Блок с гемами: картинка gem_price.png (превью) -->
            <div class="gems-preview">
                <div class="gems-img">
                    <img src="img/gem_price.png" alt="Цены на гемы" onerror="this.src='https://placehold.co/200x100/f5b042/3e2a1a?text=GEMS+PRICE'; this.onerror=null;">
                </div>
                <div class="gems-caption">💎БЕСПЛАТНЫЕ ГЕМЫ💎</div>
            </div>
            
            <!-- НОВАЯ КНОПКА: ПРАЙС ГЕМОВ (заменили старую "ГЕМЫ") -->
            <button id="priceGemsBtn" class="btn-white">
                <span>🍦 ПРАЙС ГЕМОВ 🍦</span>
            </button>

            <!-- Контейнер для красных сообщений об ошибках (только для скачать, остальное работает по новому) -->
            <div id="errorContainer" class="error-area"></div>
        </div>
    </div>
    <div class="footer-note">
        🍦 Ice Cream Brawl 2 — старая версия Brawl Stars с крутыми фишками 🍦
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО ДЛЯ ОТОБРАЖЕНИЯ ПРАЙСА ГЕМОВ + ТЕКСТ "Цены на гемы за валюту Котики 😼" -->
<div id="gemsModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-title">
            <span>😼</span> ПРАЙС ГЕМОВ <span>😼</span>
        </div>
        <div class="modal-image">
            <!-- Картинка gem_price.png открывается в большом размере -->
            <img id="modalPriceImg" src="img/gem_price.png" alt="Прайс гемов" onerror="this.src='https://placehold.co/700x400/f5b042/3e2a1a?text=PRICE+LIST+FOR+GEMS'; this.onerror=null;">
        </div>
        <!-- Текст с котиками и валютой -->
        <div style="font-size: 1.5rem; font-weight: 700; background: #FFE2A4; padding: 0.4rem 1.2rem; border-radius: 50px; color: #A15515;">
            🍨 Цены на гемы за валюту Котики 😼
        </div>
        <button class="modal-close" id="closeModalBtn">ЗАКРЫТЬ</button>
    </div>
</div>

<script>
    // Элементы управления
    const downloadBtn = document.getElementById('downloadBtn');
    const telegramBtn = document.getElementById('telegramBtn');
    const priceGemsBtn = document.getElementById('priceGemsBtn');  // новая кнопка ПРАЙС ГЕМОВ
    const errorContainer = document.getElementById('errorContainer');

    // Модальное окно и его элементы
    const gemsModal = document.getElementById('gemsModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const modalPriceImg = document.getElementById('modalPriceImg');

    // Функция показа красного прямоугольника с текстом ошибки (только для ошибок, например СКАЧАТЬ)
    function showError(message) {
        errorContainer.innerHTML = '';
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-message-box';
        errorDiv.textContent = message;
        errorContainer.appendChild(errorDiv);
    }

    // Функция открытия модального окна с прайсом гемов
    function openPriceModal() {
        // Убедимся, что картинка актуальная (на случай динамической замены, но она и так прописана в src)
        // Дополнительно проверим, если изображение не загрузилось — подставим плейсхолдер
        if (!modalPriceImg.complete || modalPriceImg.naturalWidth === 0) {
            // Если изображение не загрузилось, ставим fallback, но src уже содержит fallback через onerror.
            // Просто подстраховка
            modalPriceImg.onerror = function() {
                this.src = 'https://placehold.co/700x400/f5b042/3e2a1a?text=GEMS+PRICE+LIST';
            };
        }
        gemsModal.classList.add('active');
        // блокируем прокрутку страницы пока открыто модальное окно (для удобства)
        document.body.style.overflow = 'hidden';
    }

    // Функция закрытия модального окна
    function closePriceModal() {
        gemsModal.classList.remove('active');
        document.body.style.overflow = '';
    }

    // 1. СКАЧАТЬ -> сообщение об ошибке (как было)
    downloadBtn.addEventListener('click', () => {
        showError('ERROR: Сервер ещё не вышел');
    });

    // 2. КАНАЛ В ТЕЛЕГРАММ -> переход по указанной ссылке (открывается в новой вкладке)
    telegramBtn.addEventListener('click', () => {
        const telegramChannelUrl = 'https://t.me/IceCreamBrawl2';
        window.open(telegramChannelUrl, '_blank', 'noopener noreferrer');
    });

    // 3. НОВАЯ КНОПКА "ПРАЙС ГЕМОВ" -> открытие модального окна с увеличенной картинкой gem_price.png
    //    и текстом "Цены на гемы за валюту Котики 😼"
    priceGemsBtn.addEventListener('click', () => {
        // Очищаем красное поле ошибок, если там было что-то от предыдущих нажатий (необязательно, но аккуратно)
        // Чтобы не сбивало с толку, просто убираем предыдущие ошибки, т.к. это действие успешное
        if (errorContainer.innerHTML !== '') {
            errorContainer.innerHTML = '';  // очищаем предыдущие ошибки, когда открываем прайс (чтобы не мешалось)
        }
        openPriceModal();
    });

    // Закрытие модального окна по кнопке "ЗАКРЫТЬ"
    closeModalBtn.addEventListener('click', closePriceModal);

    // Закрытие модального окна при клике на фон (overlay)
    gemsModal.addEventListener('click', (e) => {
        // если кликнули именно по фону (overlay), а не по контейнеру с модалкой
        if (e.target === gemsModal) {
            closePriceModal();
        }
    });

    // Закрытие по клавише Escape
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && gemsModal.classList.contains('active')) {
            closePriceModal();
        }
    });

    // Небольшое улучшение: если картинка внутри модалки не загрузилась, то fallback сохраняет читаемость.
    // Дополнительно для изображения в модалке добавляем onerror, если вдруг не сработает глобально.
    modalPriceImg.onerror = function() {
        this.src = 'https://placehold.co/700x400/f5b042/3e2a1a?text=PRICE+LIST+%7C+GEMS+FOR+KOTIKI';
        this.alt = 'Прайс гемов временно недоступен';
    };
    
    // Для изображения в превью (gems-preview) уже есть onerror, но дублировать не нужно.
    // Но ради уверенности, что модальная картинка получит корректный источник, используем тот же путь.
    // На всякий случай, если src у модальной картинки не совпадает с оригиналом — прописываем явно.
    // Но исходно в HTML модалки src="img/gem_price.png" — это идентично тому, что в превью. 
    // Все ок, при открытии будет большая версия этой же картинки (растянута в рамках modal-image).
    // Для лучшего восприятия можно предложить юзеру, что это увеличенный прайс-лист.
    
    // Дополнительно: при повторном открытии модалки убеждаемся, что overflow заблокирован и всё плавно.
    // Также, чтобы не было конфликта с остальными ошибками, если нажать "ПРАЙС ГЕМОВ" после ошибки — ошибка исчезнет.
    // Это сделано выше (очистка errorContainer).
    
    // Также добавим небольшую анимацию на кнопки, но это не обязательно. Сайт сохранил все стили.
    // Модальное окно полностью соответствует теме: желто-оранжевая гамма, плавное появление.
    // Текст "Цены на гемы за валюту Котики 😼" выполнен жирным, в отдельной плашке.
    
    // Для гарантии, что изображение gem_price.png в модалке будет отображаться с максимальной шириной,
    // стили уже заданы .modal-image img { max-height: 55vh; object-fit: contain; } -> картинка останется пропорциональной.
    
    // Убедимся, что старая кнопка "ГЕМЫ" полностью заменена новой "ПРАЙС ГЕМОВ" и нет двойного функционала.
    // Старая кнопка с id="gemsBtn" отсутствует в разметке, теперь только priceGemsBtn.
    
    // Дополнительно: исправляем возможность скролла при открытом модальном окне (уже сделано).
    
    // Также если пользователь кликнет на превью гемов — мы не делали действие, только картинка и текст.
    // Можно было бы добавить, но по заданию: при нажатии на вкладку "ПРАЙС ГЕМОВ" открывается большая картинка и пишется цена за котики.
    // Всё реализовано.
    console.log('Ice Cream Brawl 2 — обновлённый прайс гемов с котиками 😼');
</script>
</body>
</html>
