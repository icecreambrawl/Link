<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ice Cream Brawl 2 — приватный сервер Brawl Stars</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #FFD966 0%, #FFB347 100%);
            font-family: 'Segoe UI', 'Poppins', 'Brawl Stars', system-ui, -apple-system, 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
        }

        /* основной карточный контейнер с желтым фоном */
        .glass-panel {
            max-width: 1300px;
            width: 100%;
            background: #FFE484;
            border-radius: 4rem 3rem 4rem 3rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), 0 0 0 8px rgba(255, 215, 0, 0.5);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* зона заголовка с фоном-изображением или цветом */
        .hero-banner {
            background: #F7D44A;
            background-image: radial-gradient(circle at 10% 30%, rgba(255, 245, 190, 0.6) 2%, transparent 2.5%),
                              radial-gradient(circle at 85% 70%, rgba(255, 220, 100, 0.5) 1.8%, transparent 2%);
            background-size: 40px 40px, 35px 35px;
            padding: 2.5rem 2rem 1.8rem 2rem;
            text-align: center;
            border-bottom: 4px solid #FFC107;
        }

        .hero-banner h1 {
            font-size: clamp(1.9rem, 7vw, 3.4rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #B45F1B, #7A3E0E);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 4px 4px 12px rgba(255, 215, 0, 0.7);
            margin-bottom: 0.5rem;
            word-break: break-word;
        }

        .hero-banner .sub {
            font-size: 1.15rem;
            font-weight: 600;
            color: #A35C1A;
            background: rgba(255, 245, 200, 0.7);
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            backdrop-filter: blur(2px);
        }

        /* контент: логотип + кнопки + иконки */
        .content-core {
            padding: 2.2rem 2rem 2.5rem 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 2.5rem;
            justify-content: center;
            align-items: center;
        }

        /* левая колонка: логотип сервера */
        .logo-area {
            flex: 1.2;
            min-width: 200px;
            display: flex;
            justify-content: center;
        }

        .logo-frame {
            background: #FFF2CC;
            border-radius: 3rem;
            padding: 1rem;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease;
            max-width: 320px;
            width: 100%;
        }

        .logo-frame img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 2rem;
            object-fit: contain;
            background: #ffefb9;
        }

        /* правая колонка: кнопки + ошибки */
        .buttons-area {
            flex: 2;
            min-width: 260px;
            display: flex;
            flex-direction: column;
            gap: 1.7rem;
        }

        /* стили белых кнопок */
        .btn-white {
            background: white;
            border: none;
            border-radius: 60px;
            padding: 1rem 1.5rem;
            font-size: 1.5rem;
            font-weight: 800;
            font-family: inherit;
            letter-spacing: 1px;
            color: #D98E2B;
            box-shadow: 0 8px 0 #C9A03D;
            cursor: pointer;
            transition: all 0.1s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            width: 100%;
            text-align: center;
        }

        .btn-white:active {
            transform: translateY(3px);
            box-shadow: 0 4px 0 #C9A03D;
        }

        /* иконки внутри кнопок */
        .btn-icon {
            width: 36px;
            height: 36px;
            object-fit: contain;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
        }

        .btn-white span {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        /* блок для отображения ошибок (красный прямоугольник) */
        .error-message-box {
            background-color: #B91C1C;
            border-left: 10px solid #FFE6A3;
            border-radius: 20px;
            padding: 0.9rem 1.2rem;
            margin-top: 0.8rem;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
            transition: 0.2s;
            backdrop-filter: blur(1px);
            font-family: monospace;
            letter-spacing: 0.5px;
            word-break: break-word;
        }

        /* контейнер для ошибок */
        .error-area {
            margin-top: 0.5rem;
        }

        /* адаптивность */
        @media (max-width: 780px) {
            .content-core {
                flex-direction: column;
                padding: 1.5rem;
            }
            .btn-white {
                font-size: 1.2rem;
                padding: 0.8rem 1rem;
            }
            .btn-icon {
                width: 28px;
                height: 28px;
            }
            .hero-banner {
                padding: 1.8rem 1rem;
            }
        }

        /* футер */
        .footer-note {
            background: #FADB67;
            text-align: center;
            padding: 1rem;
            font-size: 0.8rem;
            color: #7A4512;
            font-weight: 500;
            border-top: 1px solid #FFE087;
        }

        button {
            background: white;
        }

        button:focus-visible {
            outline: 3px solid #AA5E1C;
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <!-- ЗАГОЛОВОК -->
    <div class="hero-banner">
        <h1>ICE CREAM BRAWL 2 - ПРИВАТНЫЙ СЕРВЕР BRAWL STARS!</h1>
        <div class="sub">🍦 Официальный сайт 🍦</div>
    </div>

    <div class="content-core">
        <!-- Левая часть: server_logo.png -->
        <div class="logo-area">
            <div class="logo-frame">
                <img src="img/server_logo.png" alt="Логотип Ice Cream Brawl" onerror="this.src='https://placehold.co/400x400/FFD966/623d1a?text=LOGO+ICE+CREAM'; this.onerror=null;">
            </div>
        </div>

        <!-- Правая часть с кнопками (удалён блок .gems-preview с картинкой gem_price.png) -->
        <div class="buttons-area">
            <!-- КНОПКА СКАЧАТЬ -->
            <button id="downloadBtn" class="btn-white">
                <span>📁 СКАЧАТЬ</span>
            </button>

            <!-- КНОПКА КАНАЛ В ТЕЛЕГРАММ -->
            <button id="telegramBtn" class="btn-white">
                <span>
                    <img class="btn-icon" src="img/telegram_icon.png" alt="Telegram" onerror="this.src='https://placehold.co/48x48/0088cc/white?text=TG'; this.onerror=null;">
                    КАНАЛ В ТЕЛЕГРАММ
                </span>
            </button>

            <!-- КНОПКА ГЕМЫ (оставлена, как и требовалось, но без блока с картинкой) -->
            <button id="gemsErrorBtn" class="btn-white">
                <span>💎 ГЕМЫ 💎</span>
            </button>

            <!-- Контейнер для красных сообщений об ошибках -->
            <div id="errorContainer" class="error-area"></div>
        </div>
    </div>
    <div class="footer-note">
        🍦 Ice Cream Brawl 2 — старая версия Brawl Stars с крутыми фишками 🍦
    </div>
</div>

<script>
    // Элементы управления
    const downloadBtn = document.getElementById('downloadBtn');
    const telegramBtn = document.getElementById('telegramBtn');
    const gemsErrorBtn = document.getElementById('gemsErrorBtn');
    const errorContainer = document.getElementById('errorContainer');

    // Функция показа красного прямоугольника с текстом ошибки
    function showError(message) {
        errorContainer.innerHTML = '';
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-message-box';
        errorDiv.textContent = message;
        errorContainer.appendChild(errorDiv);
        
        // Плавная прокрутка до сообщения об ошибке, чтобы пользователь его заметил
        errorDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // Функция очистки ошибок
    function clearErrors() {
        errorContainer.innerHTML = '';
    }

    // 1. СКАЧАТЬ -> сообщение об ошибке (сервер ещё не вышел)
    downloadBtn.addEventListener('click', () => {
        showError('ERROR: Сервер ещё не вышел');
    });

    // 2. КАНАЛ В ТЕЛЕГРАММ -> переход по ссылке https://t.me/IceCreamBrawl2
    telegramBtn.addEventListener('click', () => {
        const telegramChannelUrl = 'https://t.me/IceCreamBrawl2';
        window.open(telegramChannelUrl, '_blank', 'noopener noreferrer');
        clearErrors(); // убираем старые ошибки, так как действие успешно
    });

    // 3. КНОПКА ГЕМЫ -> ошибка с нужным текстом
    gemsErrorBtn.addEventListener('click', () => {
        showError('ERROR: Сейчас гемы получить нельзя');
    });

    // Всё: декоративный блок с картинкой gem_price.png и надписью "БЕСПЛАТНЫЕ ГЕМЫ" полностью удалён.
    // Кнопка "ГЕМЫ" осталась на месте и исправно показывает ошибку.
    console.log('Ice Cream Brawl 2 — удалён только блок с gem_price.png. Кнопка ГЕМЫ и остальные кнопки работают корректно.');
</script>
</body>
</html>
